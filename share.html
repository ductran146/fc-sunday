<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FC Sunday — Tổng quỹ</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="FC Sunday Quỹ">
<meta name="theme-color" content="#00332d">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #00332d;
    --green2: #005244;
    --accent: #00A887;
    --gold:   #FFC522;
    --red:    #dc2626;
    --amber:  #d97706;
    --text:   rgba(255,255,255,.9);
    --sub:    rgba(255,255,255,.45);
    --border: rgba(255,255,255,.1);
    --card-bg: rgba(255,255,255,.07);
    --gap: 40px;
    --px: 20px;
    --r: 16px;
  }

  html, body {
    height: 100%; min-height: 100dvh;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--green);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── Sticky header ── */
  .sticky-hdr {
    position: sticky; top: 0; z-index: 100;
    background: var(--green);
    padding: env(safe-area-inset-top, 0) var(--px) 0;
    /* subtle shadow to separate from scrolling content */
    box-shadow: 0 1px 0 rgba(255,255,255,.06);
  }
  .sticky-hdr.scrolled {
    box-shadow: 0 2px 16px rgba(0,0,0,.4);
  }

  /* top bar: logo + title + back button */
  .hdr-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0 14px;
  }
  .hdr-brand { display: flex; align-items: center; gap: 10px; }
  .hdr-logo { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .hdr-name { font-size: 15px; font-weight: 800; line-height: 1.2; }
  .hdr-sub  { font-size: 11px; color: var(--sub); font-weight: 500; margin-top: 1px; }

  .hdr-actions { display: flex; align-items: center; gap: 8px; }
  .btn-back {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.08); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px;
    color: var(--text); font-size: 12px; font-weight: 700;
    font-family: inherit; cursor: pointer; text-decoration: none;
    -webkit-appearance: none; flex-shrink: 0;
  }
  .btn-back:active { background: rgba(255,255,255,.15); }
  .btn-refresh-hdr {
    background: rgba(255,255,255,.08); border: 1px solid var(--border);
    border-radius: 8px; padding: 7px 12px;
    color: var(--text); font-size: 12px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    -webkit-appearance: none; flex-shrink: 0;
  }
  .btn-refresh-hdr:active { background: rgba(255,255,255,.15); }
  .spin { animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* hero total inside sticky header */
  .hdr-hero {
    padding: 4px 0 18px;
  }
  .hdr-hero-label {
    font-size: 11px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: .08em;
    margin-bottom: 4px;
  }
  .hdr-hero-amount {
    font-size: 38px; font-weight: 900; color: #fff;
    letter-spacing: -.5px; line-height: 1;
    margin-bottom: 4px;
  }
  .hdr-hero-amount.negative { color: #fca5a5; }
  .hdr-hero-sub { font-size: 12px; color: var(--sub); }

  /* ── Scrollable content ── */
  .scroll-content {
    padding: var(--gap) var(--px);
    display: flex; flex-direction: column;
    gap: var(--gap);
    padding-bottom: max(40px, env(safe-area-inset-bottom));
  }

  /* ── Module card (shared) ── */
  .module {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
  }
  .module-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .module-title {
    font-size: 12px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: .06em;
    display: flex; align-items: center; gap: 6px;
  }
  .module-badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 8px; border-radius: 20px;
    background: rgba(255,255,255,.08); color: var(--text);
  }

  /* ── 2 Fund cards ── */
  .fund-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .fund-card {
    padding: 16px;
  }
  .fund-card:first-child { border-right: 1px solid var(--border); }
  .fund-label {
    font-size: 10px; font-weight: 700; color: var(--sub);
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
  }
  .fund-amount {
    font-size: 22px; font-weight: 800; color: #fff; line-height: 1;
    margin-bottom: 10px;
  }
  .fund-amount.negative { color: #fca5a5; }
  .fund-detail { font-size: 11px; color: var(--sub); line-height: 1.8; }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
  }
  .stat-item {
    padding: 14px 16px;
  }
  .stat-item:nth-child(odd) { border-right: 1px solid var(--border); }
  .stat-item:nth-child(1),
  .stat-item:nth-child(2) { border-bottom: 1px solid var(--border); }
  .stat-label { font-size: 11px; color: var(--sub); margin-bottom: 4px; }
  .stat-val   { font-size: 17px; font-weight: 800; color: #fff; }
  .stat-val.green { color: var(--accent); }
  .stat-val.amber { color: var(--amber); }

  /* ── Members grid ── */
  .members-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 0;
  }
  .member-chip {
    padding: 10px 8px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .member-chip:nth-child(4n) { border-right: none; }
  .member-name { font-size: 10px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .member-status { font-size: 9px; color: var(--sub); margin-top: 3px; }
  .member-status.ok  { color: var(--accent); }
  .member-status.bad { color: var(--amber); }

  /* ── Status badge ── */
  .status-row { padding: 0 0 4px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .status-badge.ok  { background: rgba(0,168,135,.2); color: #5eead4; }
  .status-badge.err { background: rgba(220,38,38,.2);  color: #fca5a5; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── Footer ── */
  .footer {
    display: flex; flex-direction: column; gap: 12px;
    align-items: center;
  }
  .footer-time { font-size: 11px; color: var(--sub); }
  .btn-open-app {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 14px;
    background: var(--accent); border: none; border-radius: var(--r);
    color: #fff; font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer; text-decoration: none;
    -webkit-appearance: none;
  }
  .btn-open-app:active { background: #058069; }

  /* ── Loading ── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 60dvh; gap: 16px;
  }
  .loading-logo { width: 64px; height: 64px; border-radius: 16px; object-fit: cover; }
  .loading-text { font-size: 14px; color: var(--sub); }
</style>
</head>
<body>
<div id="wrap">
  <div class="loading" id="loading-state">
    <img src="logo.jpg" class="loading-logo" alt="FC Sunday">
    <div class="loading-text">Đang tải dữ liệu...</div>
  </div>
</div>

<script>
const FEE = 200000, FINE = 50000, BASE_YEAR = 2026;
let S = null, _year = new Date().getFullYear();

/* ── Helpers ── */
function fmt(n) {
  if (!n && n !== 0) return '0đ';
  const sign = n < 0 ? '-' : '';
  return sign + Math.abs(n).toLocaleString('vi-VN') + 'đ';
}
function fmtDate(d) {
  return d.toLocaleString('vi-VN', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
}
function _ttKey(mid, year) { return year === BASE_YEAR ? String(mid) : `${mid}_${year}`; }
function getTT(mid, mi, year) {
  year = year || _year;
  const arr = S.thuThang[_ttKey(mid,year)] || (year===BASE_YEAR ? S.thuThang[String(mid)] : null) || [];
  return arr[mi] || 0;
}
function memberPaidCount(mid, year) {
  year = year || _year;
  const arr = S.thuThang[_ttKey(mid,year)] || (year===BASE_YEAR ? S.thuThang[String(mid)] : null) || [];
  return arr.filter(v=>v===1).length;
}
function memberExemptCount(mid, year) {
  year = year || _year;
  const arr = S.thuThang[_ttKey(mid,year)] || (year===BASE_YEAR ? S.thuThang[String(mid)] : null) || [];
  return arr.filter(v=>v===2).length;
}
function activeMembers() { return (S.members||[]).filter(m=>m.status!=='left'); }
function matchesInYear(year) {
  return (S.matches||[]).filter(m => {
    const y = m.date ? parseInt(m.date.split('-')[0]) : BASE_YEAR;
    return y === (year||_year);
  });
}
function thuThangGrand(year) {
  year = year||_year;
  return activeMembers().reduce((s,m) => {
    const arr = S.thuThang[_ttKey(m.id,year)] || (year===BASE_YEAR ? S.thuThang[String(m.id)] : null) || [];
    return s + arr.filter(v=>v===1).length * FEE;
  }, 0);
}
function thuPhatGrand(year) {
  // Chỉ tính tiền đã nộp thực tế (paid: true)
  return matchesInYear(year).reduce((s,m)=>s+(m.losers||[]).filter(l=>l.paid).length*FINE, 0);
}
function thuThemGrand(year) {
  return matchesInYear(year).reduce((s,m)=>s+(m.thuThem||0), 0);
}
function chiByFund(fund, year) {
  return (S.chiTieu||[])
    .filter(c => c.date && parseInt(c.date.split('-')[0])===(year||_year) && (c.fund||'thang')===fund)
    .reduce((s,c)=>s+c.amount, 0);
}
function chiTotal(year) {
  return (S.chiTieu||[])
    .filter(c => c.date && parseInt(c.date.split('-')[0])===(year||_year))
    .reduce((s,c)=>s+c.amount, 0);
}
function tonQuyThang(year) { return thuThangGrand(year) - chiByFund('thang', year); }
function tonQuyBia(year)   { return thuPhatGrand(year) + thuThemGrand(year) - chiByFund('bia', year); }
function totalTon(year)    { return tonQuyThang(year) + tonQuyBia(year); }
function monthsRequired(year) {
  const now = new Date();
  year = year||_year;
  if (year < now.getFullYear()) return 12;
  if (year > now.getFullYear()) return 0;
  return now.getMonth() + 1;
}
function memberDebt(mid, year) {
  const mem = S.members.find(m=>m.id===mid);
  if (!mem || mem.status!=='active') return 0;
  const req    = Math.max(0, Math.min(monthsRequired(year||_year), 12) - memberExemptCount(mid, year));
  const paid   = memberPaidCount(mid, year);
  const debtFee  = Math.max(0, req - paid) * FEE;
  const debtFine = (S.matches||[]).reduce((s,m)=>s+(m.losers||[]).filter(l=>l.memberId===mid&&!l.paid).length,0)*FINE;
  return debtFee + debtFine;
}

/* ── Load data ── */
async function loadData() {
  const cfg = (() => { try { return JSON.parse(localStorage.getItem('fc_gh')||'null'); } catch(e) { return null; } })();
  let url = './data.json?t=' + Date.now();
  if (cfg?.owner && cfg?.repo) {
    const branch = cfg.branch||'main', fp = cfg.filePath||'data.json';
    url = `https://raw.githubusercontent.com/${cfg.owner}/${cfg.repo}/${branch}/${fp}?t=${Date.now()}`;
  }
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return await r.json();
}

/* ── Render ── */
function render() {
  const ton       = totalTon(_year);
  const tThang    = tonQuyThang(_year);
  const tBia      = tonQuyBia(_year);
  const thuPhi    = thuThangGrand(_year);
  const chiThang  = chiByFund('thang', _year);
  const thuBia    = thuPhatGrand(_year) + thuThemGrand(_year);
  const chiBia    = chiByFund('bia', _year);
  const am        = activeMembers();
  const req       = monthsRequired(_year);
  const matches   = matchesInYear(_year);

  const membersData = am.map(m => ({
    ...m,
    paid: memberPaidCount(m.id, _year),
    debt: memberDebt(m.id, _year),
    req:  Math.max(0, Math.min(req,12) - memberExemptCount(m.id,_year))
  })).sort((a,b) => b.debt - a.debt);

  const debtCount = membersData.filter(m=>m.debt>0).length;
  const paidFull  = membersData.filter(m=>m.debt===0).length;

  document.getElementById('wrap').innerHTML = `
    <!-- Sticky header -->
    <div class="sticky-hdr" id="sticky-hdr">
      <div class="hdr-top">
        <div class="hdr-brand">
          <img src="logo.jpg" class="hdr-logo" alt="FC Sunday">
          <div>
            <div class="hdr-name">FC Sunday</div>
            <div class="hdr-sub">Tổng hợp thu chi quỹ đội bóng</div>
          </div>
        </div>
        <div class="hdr-actions">
          <button class="btn-refresh-hdr" onclick="refresh()">
            <span id="refresh-icon">↻</span>
          </button>
          <a href="index.html" class="btn-back">
            ← Về trang chủ
          </a>
        </div>
      </div>
      <div class="hdr-hero">
        <div class="hdr-hero-label">Tổng quỹ hiện tại · Năm ${_year}</div>
        <div class="hdr-hero-amount ${ton<0?'negative':''}">${fmt(ton)}</div>
        <div class="hdr-hero-sub">Quỹ tháng ${fmt(tThang)} · Quỹ bia ${fmt(tBia)}</div>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="scroll-content">

      <!-- Status -->
      <div class="status-row">
        <span class="status-badge ok">
          <span class="dot"></span> Dữ liệu mới nhất · ${fmtDate(new Date())}
        </span>
      </div>

      <!-- 2 quỹ module -->
      <div class="module">
        <div class="module-header">
          <div class="module-title">
            <svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M3.33 17.5H5.61C6.07 17.5 6.45 17.13 6.45 16.67L6.45 7.28C6.45 6.82 6.07 6.45 5.61 6.45H3.33C2.87 6.45 2.5 6.82 2.5 7.28L2.5 16.67C2.5 17.13 2.87 17.5 3.33 17.5Z" fill="#00BC79"/><path d="M8.86 17.5H11.14C11.6 17.5 11.97 17.13 11.97 16.67V11.23C11.97 10.77 11.6 10.39 11.14 10.39H8.86C8.4 10.39 8.03 10.77 8.03 11.23V16.67C8.03 17.13 8.4 17.5 8.86 17.5Z" fill="#007FF3"/><path d="M14.39 17.5H16.67C17.13 17.5 17.5 17.13 17.5 16.67V3.33C17.5 2.87 17.13 2.5 16.67 2.5H14.39C13.93 2.5 13.55 2.87 13.55 3.33L13.55 16.67C13.55 17.13 13.93 17.5 14.39 17.5Z" fill="#FC2D4C"/></svg>
            Chi tiết 2 quỹ
          </div>
        </div>
        <div class="fund-grid">
          <div class="fund-card">
            <div class="fund-label">
              <svg width="12" height="12" viewBox="0 0 20 20" fill="none"><path d="M10 0.7C11.18 0.7 11.16 1.14 11.95 1.18C12.75 1.22 13.16 0.97 13.7 1.05C14.07 1.1 14.35 1.27 14.55 1.43C14.76 1.61 14.79 1.92 14.62 2.14L12.78 4.55C12.61 4.74 12.63 5.03 12.82 5.2C15.7 7.69 19.25 10.69 19.25 13.38C19.25 17.9 15.54 19.3 10 19.3C4.46 19.3 0.75 17.9 0.75 13.38C0.75 10.69 4.3 7.69 7.18 5.2C7.37 5.03 7.39 4.74 7.22 4.55L5.38 2.14C5.21 1.92 5.24 1.61 5.45 1.43C5.65 1.27 5.93 1.1 6.3 1.05C6.84 0.97 7.25 1.22 8.05 1.18C8.84 1.14 8.82 0.7 10 0.7Z" fill="#FFC522"/></svg>
              Quỹ hàng tháng
            </div>
            <div class="fund-amount ${tThang<0?'negative':''}">${fmt(tThang)}</div>
            <div class="fund-detail">
              Thu phí: ${fmt(thuPhi)}<br>
              Chi tiêu: ${fmt(chiThang)}
            </div>
          </div>
          <div class="fund-card">
            <div class="fund-label">
              🍺 Quỹ bia
            </div>
            <div class="fund-amount ${tBia<0?'negative':''}">${fmt(tBia)}</div>
            <div class="fund-detail">
              Thu bia: ${fmt(thuBia)}<br>
              Chi tiêu: ${fmt(chiBia)}
            </div>
          </div>
        </div>
      </div>

      <!-- Stats module -->
      <div class="module">
        <div class="module-header">
          <div class="module-title">📊 Thống kê chung</div>
          <span class="module-badge">${_year}</span>
        </div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">Thành viên</div>
            <div class="stat-val">${am.length} người</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Số trận đã đá</div>
            <div class="stat-val">${matches.length} trận</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Đóng đủ</div>
            <div class="stat-val green">${paidFull} người</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">Còn nợ quỹ</div>
            <div class="stat-val ${debtCount>0?'amber':'green'}">${debtCount} người</div>
          </div>
        </div>
      </div>

      <!-- Members module -->
      <div class="module">
        <div class="module-header">
          <div class="module-title">👥 Trạng thái thành viên</div>
          <span class="module-badge">${req} tháng</span>
        </div>
        <div class="members-grid">
          ${membersData.map(m => {
            const statusTxt = m.debt===0 ? 'Đủ ✓' : '-' + fmt(m.debt);
            const statusCls = m.debt===0 ? 'ok' : 'bad';
            const shortName = m.name.split(' ').slice(-2).join(' ');
            return `<div class="member-chip">
              <div class="member-name" title="${m.name}">${shortName}</div>
              <div class="member-status ${statusCls}">${statusTxt}</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <a href="index.html" class="btn-open-app">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3.33 17.5H5.61C6.07 17.5 6.45 17.13 6.45 16.67L6.45 7.28C6.45 6.82 6.07 6.45 5.61 6.45H3.33C2.87 6.45 2.5 6.82 2.5 7.28L2.5 16.67C2.5 17.13 2.87 17.5 3.33 17.5Z" fill="#00BC79"/><path d="M8.86 17.5H11.14C11.6 17.5 11.97 17.13 11.97 16.67V11.23C11.97 10.77 11.6 10.39 11.14 10.39H8.86C8.4 10.39 8.03 10.77 8.03 11.23V16.67C8.03 17.13 8.4 17.5 8.86 17.5Z" fill="#007FF3"/><path d="M14.39 17.5H16.67C17.13 17.5 17.5 17.13 17.5 16.67V3.33C17.5 2.87 17.13 2.5 16.67 2.5H14.39C13.93 2.5 13.55 2.87 13.55 3.33L13.55 16.67C13.55 17.13 13.93 17.5 14.39 17.5Z" fill="#FC2D4C"/></svg>
          Mở Dashboard đầy đủ
        </a>
      </div>

    </div>
  `;

  // Sticky header scroll shadow
  window.addEventListener('scroll', () => {
    const hdr = document.getElementById('sticky-hdr');
    if (hdr) hdr.classList.toggle('scrolled', window.scrollY > 10);
  }, { passive: true });
}

async function refresh() {
  const icon = document.getElementById('refresh-icon');
  if (icon) { icon.className = 'spin'; icon.textContent = '↻'; }
  try {
    S = await loadData();
    render();
  } catch(e) {
    alert('Không tải được dữ liệu. Kiểm tra kết nối mạng.');
    if (icon) { icon.className = ''; }
  }
}

/* ── Init ── */
(async () => {
  try {
    S = await loadData();
    render();
  } catch(e) {
    // Fallback localStorage
    try {
      const raw = localStorage.getItem('fc2026');
      if (raw) { S = JSON.parse(raw); render(); return; }
    } catch(e2) {}
    document.getElementById('wrap').innerHTML = `
      <div class="loading">
        <img src="logo.jpg" class="loading-logo" alt="FC Sunday">
        <div class="loading-text">Không tải được dữ liệu</div>
        <button class="btn-open-app" style="margin-top:16px;max-width:240px" onclick="location.reload()">Thử lại</button>
      </div>`;
  }
})();
</script>
</body>
</html>
