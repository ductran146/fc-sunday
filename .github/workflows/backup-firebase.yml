name: Backup Firebase to data.json

on:
  schedule:
    - cron: '0 2 * * 1'  # Mỗi thứ Hai lúc 02:00 UTC (09:00 Hà Nội)
  workflow_dispatch:       # Cho phép chạy thủ công từ GitHub Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch data from Firebase
        run: |
          curl -sf "https://fc-sunday-8f932-default-rtdb.asia-southeast1.firebasedatabase.app/.json" \
            -o data.json
          echo "Fetched $(wc -c < data.json) bytes"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: backup Firebase data — $(date '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
